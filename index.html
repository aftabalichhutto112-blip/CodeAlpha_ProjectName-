<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    -   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/400/300" class="nature" onclick="openLightbox(0)">
        <img src="https://picsum.photos/id/1016/400/300" class="nature" onclick="openLightbox(1)">
        <img src="https://picsum.photos/id/1025/400/300" class="city" onclick="openLightbox(2)">
        <img src="https://picsum.photos/id/1035/400/300" class="city" onclick="openLightbox(3)">
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>

        <button class="prev" onclick="changeImage(-1)">❮</button>

        <img id="lightbox-img">

        <button class="next" onclick="changeImage(1)">❯</button>
    </div>

    <script src="script.js"></script>

</body>
</html>r
